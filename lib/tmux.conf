# cc-remote-term tmux config — used with: tmux -L ccrt -f tmux.conf
# Minimal config: tmux is a session container, not a UI layer.

set-option -g status off                    # No status bar (we have our own sidebar)
set-option -g history-limit 50000           # 50K lines scrollback per pane
set-option -g escape-time 0                 # No escape delay (instant Esc)
set-option -g default-terminal "xterm-256color"
set-option -g mouse off                     # Mouse handled by xterm.js
set-option -g set-clipboard off             # Clipboard handled by browser

# Don't destroy session when claude exits — let server detect and clean up
set-option -g remain-on-exit on
